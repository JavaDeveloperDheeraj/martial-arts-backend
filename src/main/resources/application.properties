spring.application.name=martial-arts-backend

# Dynamic Port Binding for Railway (Cloud apne aap port assign karega, local me 8080 chalega)
server.port=${PORT:8080}

# Dynamic Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/martial_arts_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
# ⬇️ Yahan se ${} hata kar direct admin ya fallback set kiya hai
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Dynamic Static Locations for Uploads
# Local me C:/karate_uploads/ uthaega, cloud par automatic /app/uploads/ folder bana dega
spring.web.resources.static-locations=${UPLOAD_LOCATION:file:///C:/karate_uploads/}